<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100" fill="none">
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.8;1" dur="2.5s" repeatCount="indefinite" />
    <!-- Curved path starting from bottom (50,90) to top (50,10) -->
    <path d="M 50,90 C 50,70 90,70 90,50 C 90,30 50,30 50,10" stroke="#38bdf8" stroke-width="3" stroke-linecap="round" fill="none" stroke-dasharray="150" stroke-dashoffset="150">
      <animate attributeName="stroke-dashoffset" values="150;0;0" keyTimes="0;0.6;1" dur="2.5s" repeatCount="indefinite" />
    </path>
    <!-- Arrowhead pointing UP at (50,10) -->
    <polyline points="40,20 50,10 60,20" stroke="#38bdf8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" stroke-dasharray="30" stroke-dashoffset="30">
      <animate attributeName="stroke-dashoffset" values="30;30;0;0" keyTimes="0;0.5;0.6;1" dur="2.5s" repeatCount="indefinite" />
    </polyline>
  </g>
</svg>
